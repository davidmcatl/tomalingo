  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

olid rgba(167,139,250,.55);display:flex;align-items:center;justify-content:center;position:relative;background:rgba(167,139,250,.06)\">\n              <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:23px;color:#c4b5fd\">Tá<\u002Fspan>\n            <\u002Fspan>\n            <span style=\"font-size:11px;color:rgba(231,227,245,.55);font-family:'JetBrains Mono'\">Ghost<\u002Fspan>\n          <\u002Fbutton>\n          <button onclick=\"{{ setLogo3 }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px 8px;border-radius:16px;cursor:pointer;border:{{ logo3Border }};background:{{ logo3Bg }};transition:all .15s\">\n            <span style=\"width:56px;height:50px;border-radius:15px 15px 15px 4px;background:linear-gradient(150deg,#1b1530,#120e22);border:1px solid rgba(167,139,250,.4);display:flex;align-items:center;justify-content:center;position:relative\">\n              <span style=\"font-family:'Space Grotesk';font-weight:700;font-size:25px;color:#fff\">T<\u002Fspan>\n              <span style=\"position:absolute;top:9px;right:12px;width:8px;height:3px;border-radius:2px;background:#a78bfa;transform:rotate(-32deg)\"><\u002Fspan>\n            <\u002Fspan>\n            <span style=\"font-size:11px;color:rgba(231,227,245,.55);font-family:'JetBrains Mono'\">Bubble<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <button onclick=\"{{ goWords }}\" style=\"margin-top:20px;width:100%;padding:15px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(231,227,245,.7);cursor:pointer;font-weight:600;font-size:14px\">＋ Manage word list &amp; auto-translate<\u002Fbutton>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= QUIZ ================= -->\n    <sc-if value=\"{{ isQuiz }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:22px 22px 36px;display:flex;flex-direction:column;min-height:100vh\">\n      <!-- top bar -->\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px\">\n        <button onclick=\"{{ goHome }}\" style=\"width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:rgba(231,227,245,.7);cursor:pointer;font-size:18px\">✕<\u002Fbutton>\n        <div style=\"flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden\">\n          <div style=\"height:100%;width:{{ progressPct }};background:linear-gradient(90deg,#a78bfa,#7c3aed);border-radius:4px;transition:width .35s\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono';font-size:13px;color:rgba(231,227,245,.6);min-width:46px;text-align:right\">{{ progressText }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- theme switcher -->\n      <div style=\"display:flex;align-items:center;gap:8px;margin-top:18px\">\n        <span style=\"font-family:'JetBrains Mono';font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(231,227,245,.34)\">Style<\u002Fspan>\n        <sc-for list=\"{{ themeChips }}\" as=\"t\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ t.set }}\" style=\"padding:6px 12px;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;border:{{ t.border }};background:{{ t.bg }};color:{{ t.color }};transition:all .15s\">{{ t.name }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- card -->\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;padding:26px 0\">\n        <div style=\"width:100%;border-radius:26px;padding:40px 30px;text-align:center;background:{{ qt.cardBg }};border:{{ qt.cardBorder }};box-shadow:{{ qt.glow }};backdrop-filter:blur(8px);animation:popIn .3s ease both\">\n          <div style=\"display:inline-flex;align-items:center;gap:8px;padding:6px 13px;border-radius:20px;background:{{ qt.tagBg }};margin-bottom:26px\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:{{ curDot }}\"><\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono';font-size:11px;letter-spacing:.06em;color:{{ qt.tagColor }}\">{{ curGroup }} · {{ promptLang }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:46px;line-height:1.08;letter-spacing:-.02em;color:{{ qt.promptColor }};text-wrap:balance\">{{ promptWord }}<\u002Fdiv>\n          <div style=\"font-size:14px;color:{{ qt.subColor }};margin-top:14px\">Translate to {{ answerLang }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- input + feedback -->\n      <div>\n        <sc-if value=\"{{ fb.shown }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:16px 18px;border-radius:16px;background:{{ fb.bg }};border:1px solid {{ fb.border }};margin-bottom:14px;animation:popIn .25s ease both\">\n            <div style=\"display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;color:{{ fb.color }};font-family:'Space Grotesk'\">{{ fb.icon }} {{ fb.title }}<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:rgba(231,227,245,.6);margin-top:7px\">{{ fb.note }}<\u002Fdiv>\n            <sc-if value=\"{{ fb.showAnswer }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center\">\n                <span style=\"font-family:'JetBrains Mono';font-size:12px;color:rgba(231,227,245,.4)\">correct →<\u002Fspan>\n                <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:16px;color:{{ fb.color }}\">{{ fb.correct }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <input value=\"{{ inputVal }}\" onchange=\"{{ onInput }}\" onkeydown=\"{{ onKey }}\" disabled=\"{{ inputDisabled }}\" placeholder=\"{{ inputPlaceholder }}\" autocomplete=\"off\" autocorrect=\"off\" spellcheck=\"false\" style=\"width:100%;padding:18px 20px;border-radius:16px;border:2px solid {{ inputBorder }};background:rgba(255,255,255,.04);color:#fff;font-size:18px;font-family:'Space Grotesk';font-weight:500;transition:border .15s\">\n\n        <div style=\"display:flex;gap:10px;margin-top:12px\">\n          <sc-if value=\"{{ showCheck }}\" hint-placeholder-val=\"{{ true }}\">\n            <button onclick=\"{{ doCheck }}\" style=\"flex:1;padding:17px;border-radius:15px;border:none;cursor:pointer;font-family:'Space Grotesk';font-weight:600;font-size:16px;color:#fff;background:linear-gradient(120deg,#8b5cf6,#7c3aed);box-shadow:0 14px 30px -12px rgba(124,58,237,.8)\">Check answer<\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ showNext }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ doNext }}\" style=\"flex:1;padding:17px;border-radius:15px;border:none;cursor:pointer;font-family:'Space Grotesk';font-weight:600;font-size:16px;color:#fff;background:linear-gradient(120deg,#8b5cf6,#7c3aed);box-shadow:0 14px 30px -12px rgba(124,58,237,.8)\">{{ nextLabel }}<\u002Fbutton>\n          <\u002Fsc-if>\n          <button onclick=\"{{ doReveal }}\" style=\"padding:17px 18px;border-radius:15px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(231,227,245,.6);cursor:pointer;font-weight:600;font-size:14px\">Reveal<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= RESULTS ================= -->\n    <sc-if value=\"{{ isResults }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:46px 26px 50px;display:flex;flex-direction:column;align-items:center;animation:popIn .4s ease both\">\n      <div style=\"font-family:'JetBrains Mono';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(231,227,245,.42)\">Session complete<\u002Fdiv>\n      <div style=\"position:relative;width:200px;height:200px;margin-top:28px;border-radius:50%;background:{{ ringBg }};display:flex;align-items:center;justify-content:center\">\n        <div style=\"width:158px;height:158px;border-radius:50%;background:#0c0916;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n          <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:52px;line-height:1;color:#fff\">{{ resPct }}<span style=\"font-size:24px;color:#a78bfa\">%<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13px;color:rgba(231,227,245,.5);margin-top:6px\">accuracy<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:24px;margin-top:24px;text-align:center;text-wrap:balance\">{{ resHeadline }}<\u002Fdiv>\n\n      <div style=\"display:flex;gap:10px;margin-top:24px;width:100%\">\n        <div style=\"flex:1;padding:16px;border-radius:16px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);text-align:center\">\n          <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:26px;color:#34d399\">{{ resCorrect }}<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:rgba(231,227,245,.5);margin-top:3px\">correct<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;padding:16px;border-radius:16px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);text-align:center\">\n          <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:26px;color:#fbbf24\">{{ resAccent }}<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:rgba(231,227,245,.5);margin-top:3px\">accent slips<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;padding:16px;border-radius:16px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);text-align:center\">\n          <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:26px;color:#f87171\">{{ resWrong }}<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:rgba(231,227,245,.5);margin-top:3px\">to review<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasMissed }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"width:100%;margin-top:28px\">\n          <div style=\"font-family:'JetBrains Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(231,227,245,.42);margin-bottom:12px\">Words to review<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ missedList }}\" as=\"m\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:13px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06)\">\n                <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px\">{{ m.prompt }}<\u002Fspan>\n                <span style=\"font-size:14px;color:#a78bfa;font-weight:600\">{{ m.answer }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display:flex;gap:10px;width:100%;margin-top:28px\">\n        <sc-if value=\"{{ hasMissed }}\" hint-placeholder-val=\"{{ true }}\">\n          <button onclick=\"{{ reviewMissed }}\" style=\"flex:1;padding:17px;border-radius:15px;border:none;cursor:pointer;font-family:'Space Grotesk';font-weight:600;font-size:16px;color:#fff;background:linear-gradient(120deg,#8b5cf6,#7c3aed);box-shadow:0 14px 30px -12px rgba(124,58,237,.8)\">Review {{ resWrong }} words<\u002Fbutton>\n        <\u002Fsc-if>\n        <button onclick=\"{{ goHome }}\" style=\"flex:1;padding:17px;border-radius:15px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(231,227,245,.8);cursor:pointer;font-family:'Space Grotesk';font-weight:600;font-size:16px\">Home<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= WORDS CONFIG ================= -->\n    <sc-if value=\"{{ isWords }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:24px 22px 50px;animation:popIn .4s ease both\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:8px\">\n        <button onclick=\"{{ goHome }}\" style=\"width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:rgba(231,227,245,.7);cursor:pointer;font-size:17px\">←<\u002Fbutton>\n        <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:22px\">Word list<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- add form -->\n      <div style=\"margin-top:18px;padding:18px;border-radius:18px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07)\">\n        <div style=\"font-family:'JetBrains Mono';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(231,227,245,.42);margin-bottom:14px\">Add a word<\u002Fdiv>\n        <div style=\"display:flex;gap:10px\">\n          <input value=\"{{ addEsVal }}\" onchange=\"{{ onAddEs }}\" placeholder=\"Español\" autocomplete=\"off\" spellcheck=\"false\" style=\"flex:1;padding:13px 15px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-size:15px\">\n          <input value=\"{{ addEnVal }}\" onchange=\"{{ onAddEn }}\" placeholder=\"English\" autocomplete=\"off\" spellcheck=\"false\" style=\"flex:1;padding:13px 15px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-size:15px\">\n        <\u002Fdiv>\n        <button onclick=\"{{ translateAdd }}\" style=\"margin-top:10px;width:100%;padding:12px;border-radius:12px;border:1px dashed rgba(167,139,250,.4);background:rgba(167,139,250,.07);color:#c4b5fd;cursor:pointer;font-weight:600;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:9px\">\n          <sc-if value=\"{{ translating }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:14px;height:14px;border-radius:50%;border:2px solid rgba(196,181,253,.4);border-top-color:#c4b5fd;display:inline-block;animation:spin .7s linear infinite\"><\u002Fspan><\u002Fsc-if>\n          {{ translateLabel }}\n        <\u002Fbutton>\n        <div style=\"display:flex;gap:10px;margin-top:12px\">\n          <select value=\"{{ addGroupVal }}\" onchange=\"{{ onAddGroup }}\" style=\"flex:1;padding:13px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:#15101f;color:#e7e3f5;font-size:14px;cursor:pointer\">\n            <option value=\"{{ o }}\">{{ o }}<\u002Foption>\n          <\u002Fselect>\n          <button onclick=\"{{ addWord }}\" style=\"padding:13px 26px;border-radius:12px;border:none;cursor:pointer;font-weight:600;font-size:14px;color:#fff;background:linear-gradient(120deg,#8b5cf6,#7c3aed)\">Add<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- grouped list -->\n      <div style=\"margin-top:24px;display:flex;flex-direction:column;gap:22px\">\n        <sc-for list=\"{{ grouped }}\" as=\"grp\" hint-placeholder-count=\"3\">\n          <div>\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:11px\">\n              <span style=\"width:9px;height:9px;border-radius:50%;background:{{ grp.dot }};box-shadow:0 0 8px {{ grp.dot }}\"><\u002Fspan>\n              <span style=\"font-weight:600;font-size:14px\">{{ grp.name }}<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono';font-size:11px;color:rgba(231,227,245,.4)\">{{ grp.count }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:7px\">\n              <sc-for list=\"{{ grp.items }}\" as=\"w\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)\">\n                  <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:14.5px;flex:1\">{{ w.es }}<\u002Fspan>\n                  <span style=\"font-size:13px;color:rgba(231,227,245,.4)\">→<\u002Fspan>\n                  <span style=\"font-size:14px;color:rgba(231,227,245,.75);flex:1\">{{ w.en }}<\u002Fspan>\n                  <button onclick=\"{{ w.del }}\" style=\"width:28px;height:28px;border-radius:8px;border:none;background:rgba(248,113,113,.1);color:#f87171;cursor:pointer;font-size:15px;flex:none\">×<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:540,&quot;height&quot;:920}}\">\nclass Component extends DCLogic {\n  GROUPS = ['Numbers','Household items','Food & drink','Travel words','Greetings & basics','Verbs'];\n  HUES = {\n    'Numbers':'#a78bfa','Household items':'#9b8bf6','Food & drink':'#c08bf6',\n    'Travel words':'#8b9ff6','Greetings & basics':'#b58bf6','Verbs':'#d08bd6'\n  };\n  SEED = [\n    ['uno','one','Numbers'],['dos','two','Numbers'],['tres','three','Numbers'],['cuatro','four','Numbers'],['cinco','five','Numbers'],['diez','ten','Numbers'],\n    ['la mesa','table','Household items'],['la silla','chair','Household items'],['la cama','bed','Household items'],['la puerta','door','Household items'],['la ventana','window','Household items'],['la llave','key','Household items'],\n    ['el agua','water','Food & drink'],['el pan','bread','Food & drink'],['la leche','milk','Food & drink'],['el café','coffee','Food & drink'],['la manzana','apple','Food & drink'],['el queso','cheese','Food & drink'],\n    ['el aeropuerto','airport','Travel words'],['el hotel','hotel','Travel words'],['el billete','ticket','Travel words'],['la maleta','suitcase','Travel words'],['el tren','train','Travel words'],['el mapa','map','Travel words'],\n    ['hola','hello','Greetings & basics'],['adiós','goodbye','Greetings & basics'],['gracias','thank you','Greetings & basics'],['por favor','please','Greetings & basics'],['buenos días','good morning','Greetings & basics'],['perdón','sorry','Greetings & basics'],\n    ['hablar','to speak','Verbs'],['comer','to eat','Verbs'],['vivir','to live','Verbs'],['tener','to have','Verbs'],['querer','to want','Verbs'],['ir','to go','Verbs']\n  ];\n  THEMES = [{id:'aurora',name:'Aurora'},{id:'mono',name:'Mono'},{id:'pop',name:'Pop'}];\n\n  state = {\n    screen:'home', logo:1, theme:'aurora', direction:'es-en', requireAccents:false,\n    selectedGroups:['Greetings & basics','Numbers'],\n    words: this.SEED.map((t,i)=>({id:i, es:t[0], en:t[1], group:t[2]})),\n    session:null,\n    add:{ es:'', en:'', group:'Household items', translating:false },\n    nextId: this.SEED.length\n  };\n\n  norm(s){ return (s||'').toLowerCase().trim().replace(/[¿?¡!.,;:]/g,'').replace(/\\s+/g,' '); }\n  strip(s){ return this.norm(s).normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/ñ/g,'n'); }\n  variants(t){\n    const b=this.norm(t); const set=new Set([b]);\n    set.add(b.replace(/^(the |a |an |to |el |la |los |las |un |una )/,''));\n    return [...set];\n  }\n  target(w){ return this.state.direction==='es-en' ? w.en : w.es; }\n  check(input,w){\n    const tgt=this.target(w);\n    const accepts=this.variants(tgt);\n    const ni=this.norm(input);\n    if(!ni) return {kind:'wrong'};\n    if(accepts.includes(ni)) return {kind:'correct'};\n    const si=this.strip(input);\n    const acceptsStripped=accepts.map(x=>this.strip(x));\n    if(acceptsStripped.includes(si)) return this.state.requireAccents?{kind:'wrong'}:{kind:'accent'};\n    return {kind:'wrong'};\n  }\n\n  shuffle(a){ const x=a.slice(); for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];} return x; }\n\n  startSession(ids){\n    const queue=this.shuffle(ids);\n    this.setState({ screen:'quiz', session:{ queue, pos:0, input:'', fb:null, firstResults:{}, requeued:{}, results:{correct:0,accent:0,wrong:0} } });\n  }\n  startQuiz=()=>{\n    const ids=this.state.words.filter(w=>this.state.selectedGroups.includes(w.group)).map(w=>w.id);\n    if(!ids.length) return;\n    this.startSession(ids);\n  };\n\n  curWord(){ const s=this.state.session; if(!s) return null; const id=s.queue[s.pos]; return this.state.words.find(w=>w.id===id); }\n\n  doCheck=()=>{\n    const s=this.state.session; if(!s||s.fb) return;\n    const w=this.curWord(); const res=this.check(s.input,w);\n    const ns={...s}; ns.firstResults={...s.firstResults}; ns.results={...s.results}; ns.requeued={...s.requeued};\n    if(!(w.id in ns.firstResults)){\n      ns.firstResults[w.id]=res.kind;\n      if(res.kind==='correct') ns.results.correct++;\n      else if(res.kind==='accent') ns.results.accent++;\n      else ns.results.wrong++;\n    }\n    if(res.kind==='wrong' && (ns.requeued[w.id]||0)<2){ ns.queue=[...s.queue, w.id]; ns.requeued[w.id]=(ns.requeued[w.id]||0)+1; }\n    ns.fb={ kind:res.kind, correct:this.target(w), you:s.input, revealed:false };\n    this.setState({session:ns});\n  };\n  doReveal=()=>{\n    const s=this.state.session; if(!s) return; const w=this.curWord();\n    const ns={...s}; ns.firstResults={...s.firstResults}; ns.results={...s.results}; ns.requeued={...s.requeued};\n    if(!(w.id in ns.firstResults)){ ns.firstResults[w.id]='wrong'; ns.results.wrong++; }\n    if((ns.requeued[w.id]||0)<2){ ns.queue=[...s.queue,w.id]; ns.requeued[w.id]=(ns.requeued[w.id]||0)+1; }\n    ns.fb={ kind:'wrong', correct:this.target(w), you:s.input, revealed:true };\n    this.setState({session:ns});\n  };\n  doNext=()=>{\n    const s=this.state.session; if(!s) return;\n    const np=s.pos+1;\n    if(np>=s.queue.length){ this.setState({screen:'results'}); return; }\n    this.setState({session:{...s, pos:np, input:'', fb:null}});\n  };\n  onInput=(e)=>{ const s=this.state.session; this.setState({session:{...s, input:e.target.value}}); };\n  onKey=(e)=>{ if(e.key!=='Enter') return; e.preventDefault(); if(this.state.session.fb) this.doNext(); else this.doCheck(); };\n\n  reviewMissed=()=>{\n    const s=this.state.session; const ids=Object.keys(s.firstResults).filter(k=>s.firstResults[k]==='wrong').map(Number);\n    if(ids.length) this.startSession(ids);\n  };\n\n  toggleGroup=(name)=>{ const set=new Set(this.state.selectedGroups); set.has(name)?set.delete(name):set.add(name); this.setState({selectedGroups:[...set]}); };\n  goHome=()=>this.setState({screen:'home'});\n  goWords=()=>this.setState({screen:'words'});\n  toggleAccents=()=>this.setState({requireAccents:!this.state.requireAccents});\n\n  onAddEs=(e)=>this.setState({add:{...this.state.add, es:e.target.value}});\n  onAddEn=(e)=>this.setState({add:{...this.state.add, en:e.target.value}});\n  onAddGroup=(e)=>this.setState({add:{...this.state.add, group:e.target.value}});\n  addWord=()=>{ const a=this.state.add; if(!a.es.trim()||!a.en.trim()) return; this.setState({ words:[...this.state.words, {id:this.state.nextId, es:a.es.trim(), en:a.en.trim(), group:a.group}], nextId:this.state.nextId+1, add:{...a, es:'', en:''} }); };\n  deleteWord=(id)=>this.setState({words:this.state.words.filter(w=>w.id!==id)});\n\n  translateAdd=async()=>{\n    const a=this.state.add;\n    const hasEs=a.es.trim(), hasEn=a.en.trim();\n    if((hasEs&&hasEn)||(!hasEs&&!hasEn)||a.translating) return;\n    const from=hasEs?'Spanish':'English', to=hasEs?'English':'Spanish', word=hasEs?a.es.trim():a.en.trim();\n    this.setState({add:{...this.state.add, translating:true}});\n    try{\n      if(!window.claude||!window.claude.complete) throw new Error('offline');\n      const out=await window.claude.complete(`Translate this single word or short phrase from ${from} to ${to}. Reply with ONLY the translation — no quotes, no punctuation, no explanation. Keep Spanish accents and tildes. Word: \"${word}\"`);\n      const clean=(out||'').trim().replace(/^[\"'`]+|[\"'`.]+$/g,'').s accent toggle\n    const ra=st.requireAccents;\n\n    // logo selectors\n    const lb=(n)=>({border: st.logo===n?'1px solid rgba(167,139,250,.6)':'1px solid rgba(255,255,255,.06)', bg: st.logo===n?'rgba(167,139,250,.1)':'rgba(255,255,255,.025)'});\n    const l1=lb(1),l2=lb(2),l3=lb(3);\n\n    // quiz\n    const s=st.session;\n    const cur=this.curWord();\n    const qt=this.themeObj();\n    let promptWord='',promptLang='',answerLang='',curGroup='',curDot='#a78bfa',progressText='',progressPct='0%',inputVal='',fb={shown:false};\n    let showCheck=true, showNext=false, inputDisabled=false;\n    if(s&&cur){\n      promptWord = esOn?cur.es:cur.en;\n      promptLang = esOn?'Spanish':'English';\n      answerLang = esOn?'English':'Spanish';\n      curGroup=cur.group; curDot=this.HUES[cur.group];\n      progressText=`${Math.min(s.pos+1,s.queue.length)}/${s.queue.length}`;\n      progressPct=`${Math.round((s.pos/s.queue.length)*100)}%`;\n      inputVal=s.input;\n      if(s.fb){\n        const k=s.fb.kind;\n        const map={\n          correct:{title:'¡Correcto!', icon:'✓', color:'#34d399', bg:'rgba(52,211,153,.1)', border:'rgba(52,211,153,.3)', note:'Nailed it. Keep the streak going.', showAnswer:false},\n          accent:{title:'Casi — watch the accents', icon:'~', color:'#fbbf24', bg:'rgba(251,191,36,.1)', border:'rgba(251,191,36,.3)', note:`Accepted, but the correct spelling uses accents/tildes. You wrote \"${s.fb.you}\".`, showAnswer:true},\n          wrong:{title: s.fb.revealed?'Revealed':'Not quite', icon:'✕', color:'#f87171', bg:'rgba(248,113,113,.1)', border:'rgba(248,113,113,.3)', note: s.fb.revealed?'No worries — this one comes back later.':`You wrote \"${s.fb.you||'—'}\". This word returns for review.`, showAnswer:true}\n        };\n        fb={shown:true, correct:s.fb.correct, ...map[k]};\n        showCheck=false; showNext=true; inputDisabled=true;\n      }\n    }\n    const inputBorder = fb.shown ? (fb.border||'rgba(255,255,255,.1)') : 'rgba(167,139,250,.3)';\n    const nextLabel = (s && s.pos+1>=s.queue.length) ? 'See results' : 'Next word →';\n\n    const themeChips=this.THEMES.map(t=>{ const on=st.theme===t.id; return {name:t.name, set:()=>this.setState({theme:t.id}),\n      bg:on?'rgba(167,139,250,.18)':'rgba(255,255,255,.04)', border:on?'1px solid rgba(167,139,250,.5)':'1px solid rgba(255,255,255,.07)', color:on?'#e9e3ff':'rgba(231,227,245,.5)'};});\n\n    // results\n    let resPct=0,resCorrect=0,resAccent=0,resWrong=0,missedList=[],hasMissed=false,resHeadline='';\n    if(s){\n      const r=s.results; const distinct=Object.keys(s.firstResults).length||1;\n      resCorrect=r.correct; resAccent=r.accent; resWrong=r.wrong;\n      resPct=Math.round(((r.correct+r.accent)/distinct)*100);\n      missedList=Object.keys(s.firstResults).filter(k=>s.firstResults[k]==='wrong').map(k=>{const w=st.words.find(x=>x.id===Number(k)); return {prompt:esOn?w.es:w.en, answer:esOn?w.en:w.es};});\n      hasMissed=missedList.length>0;\n      resHeadline = resPct>=90?'Outstanding, Tom. 🔥'.replace(' 🔥','') : resPct>=70?'Solid work — getting there.' : resPct>=50?'Good effort. Review and retry.' : 'Early days — practice makes perfect.';\n    }\n    const ringBg = s ? `conic-gradient(#a78bfa ${resPct*3.6}deg, rgba(255,255,255,.08) 0deg)` : 'rgba(255,255,255,.08)';\n\n    // words config\n    const grouped=this.GROUPS.map(g=>({ name:g, dot:this.HUES[g], count:cnt(g), items:st.words.filter(w=>w.group===g).map(w=>({id:w.id, es:w.es, en:w.en, del:()=>this.deleteWord(w.id)})) })).filter(grp=>grp.items.length>0);\n    const a=st.add;\n    const translateLabel = a.translating ? 'Translating…' : '✦ Auto-translate the empty field';\n\n    return {\n      isHome,isQuiz,isResults,isWords,\n      logoIs1:st.logo===1, logoIs2:st.logo===2, logoIs3:st.logo===3,\n      chips, selCount,\n      setEsEn:()=>this.setState({direction:'es-en'}), setEnEs:()=>this.setState({direction:'en-es'}),\n      dirEsBg:de.bg, dirEsColor:de.color, dirEnBg:dn.bg, dirEnColor:dn.color,\n      toggleAccents:this.toggleAccents,\n      accentSubtitle: ra?'Strict — accents must be exact':'Lenient — accepts answer, flags missing accents',\n      accentTrackBg: ra?'#7c3aed':'rgba(255,255,255,.14)', accentKnobLeft: ra?'25px':'3px',\n      startQuiz:this.startQuiz,\n      startLabel: canStart?'Start quiz':'Select a deck to start',\n      startBg: canStart?'linear-gradient(120deg,#8b5cf6,#7c3aed)':'rgba(255,255,255,.06)',\n      startShadow: canStart?'0 18px 40px -14px rgba(124,58,237,.8)':'none',\n      startCursor: canStart?'pointer':'not-allowed',\n      setLogo1:()=>this.setState({logo:1}), setLogo2:()=>this.setState({logo:2}), setLogo3:()=>this.setState({logo:3}),\n      logo1Border:l1.border, logo1Bg:l1.bg, logo2Border:l2.border, logo2Bg:l2.bg, logo3Border:l3.border, logo3Bg:l3.bg,\n      goWords:this.goWords, goHome:this.goHome,\n      // quiz\n      qt, promptWord, promptLang, answerLang, curGroup, curDot, progressText, progressPct, inputVal,\n      onInput:this.onInput, onKey:this.onKey, doCheck:this.doCheck, doNext:this.doNext, doReveal:this.doReveal,\n      showCheck, showNext, inputDisabled, inputBorder, nextLabel,\n      inputPlaceholder: `Type in ${answerLang||'…'}…`,\n      fb, themeChips,\n      // results\n      resPct,resCorrect,resAccent,resWrong,missedList,hasMissed,resHeadline,ringBg,reviewMissed:this.reviewMissed,\n      // words\n      grouped, groupOptions:this.GROUPS,\n      addEsVal:a.es, addEnVal:a.en, addGroupVal:a.group, translating:a.translating, translateLabel,\n      onAddEs:this.onAddEs, onAddEn:this.onAddEn, onAddGroup:this.onAddGroup, translateAdd:this.translateAdd, addWord:this.addWord\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
